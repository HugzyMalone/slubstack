<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="lc6-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="lc6-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9333ea"/><stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="lc6-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7e22ce"/><stop offset="1" stop-color="#9d174d"/>
    </linearGradient>
  </defs>
  <!-- One large cube -->
  <g transform="translate(40 70)">
    <polygon points="0,0 -32,-18 0,-36 32,-18" fill="url(#lc6-top)"/>
    <polygon points="0,0 32,-18 32,6 0,24" fill="url(#lc6-right)"/>
    <polygon points="0,0 -32,-18 -32,6 0,24" fill="url(#lc6-left)"/>
    <!-- Internal layer hints — 2 horizontal seams suggesting 'stack' -->
    <line x1="0" y1="0" x2="32" y2="-18" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <line x1="0" y1="-12" x2="32" y2="-30" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <line x1="0" y1="-24" x2="32" y2="-42" stroke="rgba(255,255,255,0)" stroke-width="0"/>
    <line x1="0" y1="0" x2="-32" y2="-18" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
    <line x1="0" y1="-12" x2="-32" y2="-30" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
    <line x1="0" y1="8" x2="32" y2="-10" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <line x1="0" y1="16" x2="32" y2="-2" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <line x1="0" y1="8" x2="-32" y2="-10" stroke="rgba(0,0,0,0.14)" stroke-width="1"/>
    <line x1="0" y1="16" x2="-32" y2="-2" stroke="rgba(0,0,0,0.14)" stroke-width="1"/>
  </g>
</svg>
