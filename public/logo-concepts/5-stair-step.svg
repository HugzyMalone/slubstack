<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" width="96" height="80">
  <defs>
    <linearGradient id="lc5-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lc5-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="lc5-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/><stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <!-- Bottom-left cube -->
  <g transform="translate(20 70)">
    <polygon points="0,0 -18,-10 0,-20 18,-10" fill="url(#lc5-top)"/>
    <polygon points="0,0 18,-10 18,2 0,12" fill="url(#lc5-right)"/>
    <polygon points="0,0 -18,-10 -18,2 0,12" fill="url(#lc5-left)"/>
  </g>
  <!-- Middle cube, up + right -->
  <g transform="translate(48 54)">
    <polygon points="0,0 -18,-10 0,-20 18,-10" fill="url(#lc5-top)"/>
    <polygon points="0,0 18,-10 18,2 0,12" fill="url(#lc5-right)"/>
    <polygon points="0,0 -18,-10 -18,2 0,12" fill="url(#lc5-left)"/>
  </g>
  <!-- Top-right cube, up + right again -->
  <g transform="translate(76 38)">
    <polygon points="0,0 -18,-10 0,-20 18,-10" fill="url(#lc5-top)"/>
    <polygon points="0,0 18,-10 18,2 0,12" fill="url(#lc5-right)"/>
    <polygon points="0,0 -18,-10 -18,2 0,12" fill="url(#lc5-left)"/>
  </g>
</svg>
