<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="lc2-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="lc2-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="lc2-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <!-- Bottom cube -->
  <g transform="translate(28 68)">
    <polygon points="0,0 -20,-11 0,-22 20,-11" fill="url(#lc2-top)"/>
    <polygon points="0,0 20,-11 20,3 0,14" fill="url(#lc2-right)"/>
    <polygon points="0,0 -20,-11 -20,3 0,14" fill="url(#lc2-left)"/>
  </g>
  <!-- Middle cube, shifted right -->
  <g transform="translate(40 50)">
    <polygon points="0,0 -20,-11 0,-22 20,-11" fill="url(#lc2-top)"/>
    <polygon points="0,0 20,-11 20,3 0,14" fill="url(#lc2-right)"/>
    <polygon points="0,0 -20,-11 -20,3 0,14" fill="url(#lc2-left)"/>
  </g>
  <!-- Top cube, shifted back left -->
  <g transform="translate(28 32)">
    <polygon points="0,0 -20,-11 0,-22 20,-11" fill="url(#lc2-top)"/>
    <polygon points="0,0 20,-11 20,3 0,14" fill="url(#lc2-right)"/>
    <polygon points="0,0 -20,-11 -20,3 0,14" fill="url(#lc2-left)"/>
  </g>
</svg>
