<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" width="80" height="96">
  <defs>
    <linearGradient id="lc7-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="lc7-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="lc7-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <!-- Bottom big cube -->
  <g transform="translate(40 84)">
    <polygon points="0,0 -22,-12 0,-24 22,-12" fill="url(#lc7-top)"/>
    <polygon points="0,0 22,-12 22,4 0,16" fill="url(#lc7-right)"/>
    <polygon points="0,0 -22,-12 -22,4 0,16" fill="url(#lc7-left)"/>
  </g>
  <!-- Middle big cube -->
  <g transform="translate(40 64)">
    <polygon points="0,0 -22,-12 0,-24 22,-12" fill="url(#lc7-top)"/>
    <polygon points="0,0 22,-12 22,4 0,16" fill="url(#lc7-right)"/>
    <polygon points="0,0 -22,-12 -22,4 0,16" fill="url(#lc7-left)"/>
  </g>
  <!-- Three small floating cubes "dissolving" upward, decreasing opacity -->
  <g transform="translate(40 38) scale(0.55)" opacity="0.92">
    <polygon points="0,0 -22,-12 0,-24 22,-12" fill="url(#lc7-top)"/>
    <polygon points="0,0 22,-12 22,4 0,16" fill="url(#lc7-right)"/>
    <polygon points="0,0 -22,-12 -22,4 0,16" fill="url(#lc7-left)"/>
  </g>
  <g transform="translate(20 24) scale(0.36)" opacity="0.7">
    <polygon points="0,0 -22,-12 0,-24 22,-12" fill="url(#lc7-top)"/>
    <polygon points="0,0 22,-12 22,4 0,16" fill="url(#lc7-right)"/>
    <polygon points="0,0 -22,-12 -22,4 0,16" fill="url(#lc7-left)"/>
  </g>
  <g transform="translate(58 16) scale(0.28)" opacity="0.5">
    <polygon points="0,0 -22,-12 0,-24 22,-12" fill="url(#lc7-top)"/>
    <polygon points="0,0 22,-12 22,4 0,16" fill="url(#lc7-right)"/>
    <polygon points="0,0 -22,-12 -22,4 0,16" fill="url(#lc7-left)"/>
  </g>
</svg>
